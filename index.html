<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
<title>Scouter Resources — Scouting Ireland Safety Advisory Team</title>
<meta name="description" content="Safety resource library, incident reporting, and pre-meeting checklist, provided by the Scouting Ireland Safety Advisory Team." />
<meta name="theme-color" content="#1C2B33" />
<link rel="manifest" href="manifest.json" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap');
  * { box-sizing: border-box; }
  html, body, #root { margin: 0; padding: 0; min-height: 100vh; background: #EDEFEA; }
  body { -webkit-tap-highlight-color: transparent; }
  ::selection { background: #E8A33D55; }
  .scrollbar-hide::-webkit-scrollbar { display: none; }
  button { font-family: inherit; }
  .tap { transition: transform 0.12s ease, box-shadow 0.12s ease; }
  .tap:active { transform: scale(0.98); }
  .fade-in { animation: fadeIn 0.18s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-2px); } to { opacity: 1; transform: translateY(0); } }
  @media (prefers-reduced-motion: reduce) {
    .tap, .fade-in { animation: none !important; transition: none !important; }
  }
</style>

<div id="root"></div>

<script type="text/plain" id="app-source">
const { useState, useEffect, useMemo } = React;

const INCIDENT_FORM_URL = "https://form.jotform.com/252091281108046";

// ---------- Content ----------
const LIBRARY = [
  {
    code: "17103-FSG-R01",
    category: "Fire Safety",
    docType: "Guidelines",
    title: "Fire Safety Guidelines — Dens & Meeting Places",
    summary: "Statutory duties, required certificates, and Group Leader responsibilities for fire safety in dens.",
    body: "Covers Fire Services Act and Building Regulations duties, the documentation needed before a premises can be used as a den (fire safety cert, alarm/emergency lighting certs, electrical cert), and the three tiers of requirement: minimum standard (no sleepovers), interim compensatory measures while active systems are installed, and the technical inspection needed before any sleepover use. Sets out the Group Leader's specific duties, including delegating fire safety to a named Assigned Person, running fire safety training and age-appropriate drills, and ensuring the pre-meeting checklist is completed without exception.",
    icon: "flame",
    pdf: "fire-safety-guidelines.pdf",
  },
  {
    code: "SIF 20/10",
    category: "Medical",
    docType: "Forms",
    title: "Managing Medications Form",
    summary: "Parent/guardian authorisation form for Scouters administering medication during an event.",
    body: "Parents/guardians give full details of the child's medication, dosage, prescribing doctor, and any side effects, then authorise named Scouters to administer it for a specific date range. Scouters may decline to administer medication without explanation. A separate form is required for every event — it is not valid beyond the event it was completed for. Completed forms are retained by the Scouter-in-Charge.",
    icon: "heart",
    pdf: "managing-medications-form.pdf",
  },
  {
    code: "SID-YP06",
    category: "Camping & Overnights",
    docType: "Guidelines",
    title: "Camping & Adventures in the Out of Doors Guidelines",
    summary: "Approval thresholds, Scouter:Youth ratios, and welfare rules for overnight activities by section.",
    body: "Group Leader approval (via Application for Camp Approval) is required in writing at least 21 days ahead once an overnight reaches: 2+ nights for Beaver Scouts, 3+ for Cub Scouts, or 4+ for Scouts/Ventures/Rovers. At least one Scouter must hold an appropriate First Aid certificate, and the Scouting Ireland Activities Consent Form plus Managing Medications Form must be completed for every youth member under 18. Mixed-sex events require at least one male and one female Scouter present, and separate sleeping/washing accommodation. Scouter:Youth Member ratios vary by section (e.g. Beavers 3:4–16, Scouts 2:4–16) — see full ratio table in the source document.",
    icon: "tent",
    pdf: "sid-yp06-camping-guidelines.pdf",
  },
];

const CHECKLIST_TEMPLATE = {
  title: "Fire Safety Checklist — Complete Before Every Meeting",
  items: [
    "Fire alarm system in normal operation mode (power light only, no faults or isolated devices)",
    "Any faults logged and reported",
    "Fire extinguishers/blankets present and in correct locations",
    "All exits clearly identified",
    "All exit signs illuminated",
    "Attendees aware of procedures to follow in the event of a fire",
    "Attendees aware of procedures on discovering a fire",
    "Escape routes clear from obstructions",
    "Final exits clear from obstructions",
    "External escape routes clear from obstruction",
    "No evidence of damage to fire doors/frames/seals",
    "Fire doors not wedged open",
  ],
};

const TYPE_STYLE = {
  Policies: { bg: "#1C2B33", label: "POLICY" },
  Guidelines: { bg: "#2F4A3E", label: "GUIDE" },
  Forms: { bg: "#B5661F", label: "FORM" },
};

// ---------- Minimal inline icon set ----------
const Icon = {
  Search: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
  Shield: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2 4 5v6c0 5 3.5 8.5 8 9 4.5-.5 8-4 8-9V5l-8-3Z"/><line x1="12" y1="8" x2="12" y2="13"/><circle cx="12" cy="16.5" r="0.6" fill="currentColor" stroke="none"/></svg>,
  Clipboard: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="5" y="4" width="14" height="17" rx="2"/><path d="M9 4V3a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v1"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="16" y2="14"/><line x1="8" y1="18" x2="13" y2="18"/></svg>,
  Book: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 5.5C2 4.7 2.7 4 4 4c2.5 0 6 .8 8 2.3C14 4.8 17.5 4 20 4c1.3 0 2 .7 2 1.5V18c0-.8-.7-1-2-1-2.5 0-6 .8-8 2.3-2-1.5-5.5-2.3-8-2.3-1.3 0-2 .2-2 1V5.5Z"/></svg>,
  ChevronRight: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 6 15 12 9 18"/></svg>,
  ChevronDown: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>,
  Check: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
  Flame: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22c4 0 6.5-2.5 6.5-6.2 0-3-1.8-4.7-2.8-6.3-.4 1.6-1.2 2.6-2 3.1.3-2.7-.6-6-3.2-8-.2 2.6-1 4-2.4 5.4C6.4 11.6 5.5 13 5.5 15.8 5.5 19.5 8 22 12 22Z"/></svg>,
  Heart: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20.8 8.6c0 5-8.8 10.4-8.8 10.4S3.2 13.6 3.2 8.6a5 5 0 0 1 9-2.9 5 5 0 0 1 8.6 2.9Z"/></svg>,
  Tent: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 20 12 4l9 16"/><path d="M8 20 12 11l4 9"/><line x1="2" y1="20" x2="22" y2="20"/></svg>,
  ExternalLink: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>,
  Download: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3v12"/><polyline points="7 10 12 15 17 10"/><path d="M4 19h16"/></svg>,
  Wifi: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 8.5c5.5-5 14.5-5 20 0"/><path d="M5.5 12.5c3.8-3.3 9.2-3.3 13 0"/><path d="M9 16.5c1.8-1.5 4.2-1.5 6 0"/><circle cx="12" cy="20" r="0.8" fill="currentColor" stroke="none"/></svg>,
};

const ICONS = { alert: Icon.Shield, flame: Icon.Flame, heart: Icon.Heart, tent: Icon.Tent };

// ---------- Storage helpers (localStorage — this runs as a real deployed site) ----------
function safeGet(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch {
    return fallback;
  }
}
function safeSet(key, value) {
  try {
    localStorage.setItem(key, JSON.stringify(value));
  } catch {
    // best-effort; ignore failures (e.g. private browsing)
  }
}

function SafetyFieldKit() {
  const [tab, setTab] = useState("library");
  const [query, setQuery] = useState("");
  const [activeCategory, setActiveCategory] = useState("All");
  const [expanded, setExpanded] = useState(null);
  const [checklist, setChecklist] = useState(() => safeGet("checklist-state", {}));
  const [online, setOnline] = useState(typeof navigator !== "undefined" ? navigator.onLine : true);

  useEffect(() => {
    const on = () => setOnline(true);
    const off = () => setOnline(false);
    window.addEventListener("online", on);
    window.addEventListener("offline", off);
    return () => {
      window.removeEventListener("online", on);
      window.removeEventListener("offline", off);
    };
  }, []);

  const categories = useMemo(
    () => ["All", ...Array.from(new Set(LIBRARY.map((d) => d.category)))],
    []
  );

  const filtered = useMemo(() => {
    return LIBRARY.filter((d) => {
      const matchesCat = activeCategory === "All" || d.category === activeCategory;
      const q = query.trim().toLowerCase();
      const matchesQuery =
        !q ||
        d.title.toLowerCase().includes(q) ||
        d.summary.toLowerCase().includes(q) ||
        d.code.toLowerCase().includes(q);
      return matchesCat && matchesQuery;
    });
  }, [query, activeCategory]);

  const toggleChecklistItem = (idx) => {
    const next = { ...checklist, [idx]: !checklist[idx] };
    setChecklist(next);
    safeSet("checklist-state", next);
  };

  const checklistDone = Object.values(checklist).filter(Boolean).length;
  const checklistTotal = CHECKLIST_TEMPLATE.items.length;

  return (
    <div style={styles.app}>
      <header style={styles.header}>
        <div style={styles.eyebrowRow}>
          <span style={styles.eyebrow}>SCOUTING IRELAND</span>
          {!online && (
            <span style={styles.offlineBadge}>
              <Icon.Wifi width={11} height={11} style={{ marginRight: 4 }} />
              OFFLINE MODE
            </span>
          )}
        </div>
        <h1 style={styles.h1}>Scouter Resources</h1>
        <div style={styles.headerSub}>Safety Advisory Team</div>
      </header>

      <main style={styles.main}>
        {tab === "library" && (
          <div>
            <div style={styles.searchBar}>
              <Icon.Search width={16} height={16} style={{ color: "#6B7770", flexShrink: 0 }} />
              <input
                placeholder="Search policies, e.g. 'fire', 'SID-YP06'"
                value={query}
                onChange={(e) => setQuery(e.target.value)}
                style={styles.searchInput}
              />
            </div>

            <div style={styles.chipRow} className="scrollbar-hide">
              {categories.map((c) => (
                <button
                  key={c}
                  onClick={() => setActiveCategory(c)}
                  className="tap"
                  style={{ ...styles.chip, ...(activeCategory === c ? styles.chipActive : {}) }}
                >
                  {c}
                </button>
              ))}
            </div>

            <div style={{ marginTop: 16 }}>
              {filtered.length === 0 && (
                <div style={styles.empty}>No matching guidance. Try a different search or category.</div>
              )}
              {filtered.map((doc) => {
                const DocIcon = ICONS[doc.icon] || Icon.Shield;
                const isOpen = expanded === doc.code;
                const typeStyle = TYPE_STYLE[doc.docType] || TYPE_STYLE.Guidelines;
                return (
                  <div key={doc.code} style={{ ...styles.card, ...(isOpen ? styles.cardOpen : {}) }} className="tap">
                    <div style={{ ...styles.typeTab, background: typeStyle.bg }}>{typeStyle.label}</div>
                    <button style={styles.cardHeader} onClick={() => setExpanded(isOpen ? null : doc.code)}>
                      <div style={styles.cardIconWrap}>
                        <DocIcon width={19} height={19} style={{ color: "#2F4A3E" }} />
                      </div>
                      <div style={{ flex: 1, textAlign: "left" }}>
                        <div style={styles.cardCode}>{doc.code}</div>
                        <div style={styles.cardTitle}>{doc.title}</div>
                        <div style={styles.cardSummary}>{doc.summary}</div>
                      </div>
                      {isOpen ? (
                        <Icon.ChevronDown width={18} height={18} style={{ color: "#6B7770", flexShrink: 0, marginTop: 2 }} />
                      ) : (
                        <Icon.ChevronRight width={18} height={18} style={{ color: "#6B7770", flexShrink: 0, marginTop: 2 }} />
                      )}
                    </button>
                    {isOpen && (
                      <div style={styles.cardBody} className="fade-in">
                        <div style={styles.hazardBar} />
                        <p style={{ margin: "10px 0 0 0", fontSize: 14, lineHeight: 1.55, color: "#2A322D" }}>
                          {doc.body}
                        </p>
                        {doc.pdf && (
                          <a href={doc.pdf} target="_blank" rel="noopener noreferrer" style={styles.pdfLink}>
                            <Icon.Download width={14} height={14} style={{ color: "#F5F5F0" }} />
                            View full document (PDF)
                          </a>
                        )}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {tab === "report" && (
          <div>
            <div style={styles.eyebrowSmall}>INCIDENT / NEAR-MISS</div>
            <div style={styles.sectionTitle}>Report an incident or near-miss</div>
            <p style={{ fontSize: 13.5, color: "#4A524A", lineHeight: 1.55, margin: "10px 0 16px 0" }}>
              Incident and near-miss reports are submitted through Scouting Ireland's official reporting form.
              Tap below to open it — it works the same as filling it in on a computer.
            </p>
            <a href={INCIDENT_FORM_URL} target="_blank" rel="noopener noreferrer" style={styles.reportLinkCard} className="tap">
              <div style={styles.cardIconWrap}>
                <Icon.Shield width={19} height={19} style={{ color: "#2F4A3E" }} />
              </div>
              <div style={{ flex: 1 }}>
                <div style={styles.cardTitle}>Open Incident Report Form</div>
                <div style={styles.cardSummary}>Scouting Ireland official form (Jotform)</div>
              </div>
              <Icon.ExternalLink width={18} height={18} style={{ color: "#6B7770" }} />
            </a>
            <div style={styles.noteBox}>
              Report as soon as possible after the event, while details are fresh. If anyone needs urgent
              medical attention, call emergency services first — the form is not a substitute for that.
              {!online && " This form needs an internet connection to submit — it will not work offline."}
            </div>
          </div>
        )}

        {tab === "checklist" && (
          <div>
            <div style={styles.eyebrowSmall}>{CHECKLIST_TEMPLATE.title}</div>
            <div style={styles.progressWrap}>
              <div style={styles.progressTrack}>
                <div style={{ ...styles.progressFill, width: `${(checklistDone / checklistTotal) * 100}%` }} />
              </div>
              <div style={styles.progressLabel}>{checklistDone} / {checklistTotal} complete</div>
            </div>
            <div style={{ marginTop: 14 }}>
              {CHECKLIST_TEMPLATE.items.map((item, idx) => (
                <button key={idx} style={styles.checkItem} className="tap" onClick={() => toggleChecklistItem(idx)}>
                  <div style={{ ...styles.checkbox, ...(checklist[idx] ? styles.checkboxDone : {}) }}>
                    {checklist[idx] && <Icon.Check width={13} height={13} style={{ color: "#F5F5F0" }} />}
                  </div>
                  <span
                    style={{
                      fontSize: 14.5,
                      color: checklist[idx] ? "#8A9089" : "#22282B",
                      textDecoration: checklist[idx] ? "line-through" : "none",
                      textAlign: "left",
                    }}
                  >
                    {item}
                  </span>
                </button>
              ))}
            </div>
          </div>
        )}
      </main>

      <div style={styles.footer}>Scouting Ireland · Safety Advisory Team</div>

      <nav style={styles.nav}>
        <NavBtn active={tab === "library"} onClick={() => setTab("library")} icon={<Icon.Book width={19} height={19} />} label="Library" />
        <NavBtn active={tab === "report"} onClick={() => setTab("report")} icon={<Icon.Shield width={19} height={19} />} label="Report" />
        <NavBtn active={tab === "checklist"} onClick={() => setTab("checklist")} icon={<Icon.Clipboard width={19} height={19} />} label="Checklist" />
      </nav>
    </div>
  );
}

function NavBtn({ active, onClick, icon, label }) {
  return (
    <button onClick={onClick} style={styles.navBtn} className="tap">
      <div style={{ color: active ? "#2F4A3E" : "#8A9089" }}>{icon}</div>
      <span style={{ fontSize: 11, fontWeight: 600, color: active ? "#2F4A3E" : "#8A9089", marginTop: 3 }}>
        {label}
      </span>
      {active && <div style={styles.navIndicator} />}
    </button>
  );
}
